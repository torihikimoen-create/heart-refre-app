<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ハートリフレ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#a8c4d4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ハートリフレ">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f4f0;
      --text: #2a2220;
      --muted: #9a8a84;
      --water: #a8c4d4;
      --water-deep: #6a9ab0;
      --pink: #e8a4b0;
      --card: #ffffff;
      --border: rgba(42,34,32,0.08);
      --radius: 16px;
      --shadow: 0 4px 24px rgba(42,34,32,0.06);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Water background ── */
    .water-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ripple {
      position: absolute;
      left: 50%;
      bottom: 8%;
      width: 6px;
      height: 6px;
      margin-left: -3px;
      border-radius: 50%;
      border: 1.5px solid rgba(168, 196, 212, 0.28);
      animation: ripple-expand 9s ease-out infinite;
    }
    .ripple:nth-child(2) { animation-delay: 3s; }
    .ripple:nth-child(3) { animation-delay: 6s; }

    @keyframes ripple-expand {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(360); opacity: 0; }
    }

    /* ── App shell ── */
    #app {
      position: relative;
      z-index: 1;
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Views ── */
    .view {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 28px 22px max(env(safe-area-inset-bottom, 20px), 24px);
      overflow-y: auto;
      animation: fade-up 0.38s ease;
    }
    .view.active { display: flex; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════
       HOME VIEW
    ══════════════════════════ */
    .home-header {
      text-align: center;
      padding: 36px 0 28px;
    }

    .home-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--water), var(--water-deep));
      border-radius: 18px;
      font-size: 28px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(106,154,176,0.35);
    }

    .home-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .home-sub {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.75;
      max-width: 260px;
      margin: 0 auto 16px;
    }

    .home-divider {
      width: 40px; height: 2.5px;
      background: linear-gradient(to right, var(--water), var(--pink));
      border-radius: 2px;
      margin: 0 auto;
    }

    .home-prompt {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 14px;
      letter-spacing: 0.03em;
    }

    /* Category grid */
    .categories {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
      flex: 1;
      align-content: center;
    }

    .cat-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 14px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: var(--shadow);
      user-select: none;
    }
    .cat-card:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(42,34,32,0.09); }
    .cat-card:active { transform: scale(0.97); }
    .cat-card.full   { grid-column: 1 / -1; padding: 18px 14px; }

    .cat-emoji { font-size: 30px; display: block; margin-bottom: 7px; }
    .cat-name  { font-size: 14px; font-weight: 500; color: var(--text); }

    /* ══════════════════════════
       INPUT VIEW
    ══════════════════════════ */
    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 13.5px;
      font-family: 'DM Sans', sans-serif;
      padding: 6px 0 16px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .back-btn:hover { color: var(--text); }

    .cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--water), var(--water-deep));
      color: #fff;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 22px;
      align-self: flex-start;
    }

    .input-question {
      font-family: 'Shippori Mincho', serif;
      font-size: 21px;
      font-weight: 500;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 20px;
    }

    #input-area {
      display: flex;
      flex-direction: column;
      flex: 1;
      transition: transform 1s cubic-bezier(0.4,0,1,1),
                  opacity 0.7s ease-in,
                  filter 0.7s ease-in;
    }
    #input-area.flowing {
      transform: translateY(160px);
      opacity: 0;
      filter: blur(7px);
      pointer-events: none;
    }

    #input-text {
      flex: 1;
      min-height: 160px;
      max-height: 260px;
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 15px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: var(--text);
      resize: none;
      outline: none;
      line-height: 1.7;
      box-shadow: var(--shadow);
      transition: border-color 0.2s ease;
    }
    #input-text:focus  { border-color: var(--water); }
    #input-text::placeholder { color: var(--muted); opacity: 0.65; }

    .flow-btn {
      margin-top: 18px;
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, var(--water), var(--water-deep));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Shippori Mincho', serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(106,154,176,0.4);
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .flow-btn:hover  { opacity: 0.92; transform: translateY(-1px); }
    .flow-btn:active { transform: scale(0.98); }

    /* Button ripple */
    .btn-ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: btn-ripple 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes btn-ripple {
      to { transform: scale(4); opacity: 0; }
    }

    .privacy-note {
      text-align: center;
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 11px;
      opacity: 0.75;
      letter-spacing: 0.03em;
    }

    /* ══════════════════════════
       PRAISE VIEW
    ══════════════════════════ */
    #view-praise {
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .praise-icon-wrap {
      font-size: 46px;
      margin-bottom: 28px;
      animation: float 3.5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-9px); }
    }

    #praise-text {
      font-family: 'Shippori Mincho', serif;
      font-size: 20px;
      font-weight: 500;
      line-height: 1.95;
      color: var(--text);
      max-width: 300px;
      margin: 0 auto 14px;
      opacity: 0;
      transform: translateY(-18px);
      transition: opacity 0.85s ease, transform 0.85s ease;
    }
    #praise-text.show { opacity: 1; transform: translateY(0); }

    .praise-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 40px;
      opacity: 0;
      transition: opacity 0.6s ease 0.5s;
    }
    .praise-sub.show { opacity: 1; }

    .praise-wave {
      width: 100%;
      max-width: 280px;
      margin: 0 auto 32px;
      opacity: 0;
      transition: opacity 0.5s ease 0.3s;
    }
    .praise-wave.show { opacity: 0.25; }

    .praise-btns {
      display: flex;
      flex-direction: column;
      gap: 11px;
      width: 100%;
      max-width: 300px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.6s ease 0.7s, transform 0.6s ease 0.7s;
    }
    .praise-btns.show { opacity: 1; transform: translateY(0); }

    .btn-again {
      padding: 16px;
      background: linear-gradient(135deg, var(--water), var(--water-deep));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(106,154,176,0.35);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-again:hover  { opacity: 0.9; }
    .btn-again:active { transform: scale(0.98); }

    .btn-done {
      padding: 15px;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-done:hover { color: var(--text); border-color: rgba(42,34,32,0.18); }
  </style>
</head>
<body>

<!-- Water ripple background -->
<div class="water-bg">
  <div class="ripple"></div>

  <!-- ② Input -->

    <div class="cat-badge" id="cat-badge">💕 恋愛</div>

  <div class="view" id="view-praise">

    <p id="praise-text"></p>

    <div class="praise-btns" id="praise-btns">
      <button class="btn-again" onclick="flowAgain()">もう一度流す</button>
      <button class="btn-done" onclick="showView('home')">今日はおわり</button>
    </div>
  </div>

</div>

═══════════════════════════════ */

/* ═══════════════════════════════

═══════════════════════════════ */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
}

/* ═══════════════════════════════
   CATEGORY SELECT
═══════════════════════════════ */
function selectCategory(cat) {
  selectedCat = cat;
  const info = catInfo[cat];
  document.getElementById('cat-badge').textContent = info.badge;
  document.getElementById('input-text').placeholder = info.placeholder;
  document.getElementById('input-text').value = '';
  document.getElementById('input-area').classList.remove('flowing');
  isFlowing = false;
  showView('input');
  // slight delay then focus
  setTimeout(() => document.getElementById('input-text').focus(), 350);
}

/* ═══════════════════════════════
   FLOW ANIMATION
═══════════════════════════════ */
function flowText(e) {
  if (isFlowing) return;
  const text = document.getElementById('input-text').value.trim();
  if (!text) {
    // shake hint
    const btn = document.getElementById('flow-btn');
    btn.style.transition = 'transform 0.08s';
    const shakes = [6,-6,5,-5,3,-3,0];
    shakes.forEach((x, i) => {
      setTimeout(() => { btn.style.transform = `translateX(${x}px)`; }, i * 60);
    });
    return;
  }

  // Ripple on button
  if (e) {
    const btn = document.getElementById('flow-btn');
    const rect = btn.getBoundingClientRect();
    const r = document.createElement('span');
    r.className = 'btn-ripple';
    const size = Math.max(btn.offsetWidth, btn.offsetHeight);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 650);
  }

  isFlowing = true;
  document.getElementById('input-area').classList.add('flowing');

  setTimeout(() => {
    // Content is NOT saved
    document.getElementById('input-text').value = '';
    document.getElementById('input-area').classList.remove('flowing');
    isFlowing = false;
    showPraise();
  }, 1050);
}

/* ═══════════════════════════════
   PRAISE DISPLAY
═══════════════════════════════ */
function showPraise() {
  const list = praiseMap[selectedCat] || praiseSelf;
  const praise = list[Math.floor(Math.random() * list.length)];

  const praiseEl  = document.getElementById('praise-text');
  const subEl     = document.getElementById('praise-sub');
  const btnsEl    = document.getElementById('praise-btns');
  const waveEl    = document.getElementById('praise-wave');
  const iconEl    = document.getElementById('praise-icon');

  // Reset
  [praiseEl, subEl, btnsEl, waveEl].forEach(el => el.classList.remove('show'));
  praiseEl.textContent = praise;
  iconEl.textContent = catInfo[selectedCat]?.icon || '💧';

  showView('praise');

  // Staggered reveal
  requestAnimationFrame(() => {
    setTimeout(() => praiseEl.classList.add('show'), 80);
    setTimeout(() => waveEl.classList.add('show'),   300);
    setTimeout(() => subEl.classList.add('show'),    500);
    setTimeout(() => btnsEl.classList.add('show'),   720);
  });
}

function flowAgain() {
  document.getElementById('input-text').value = '';
  document.getElementById('input-area').classList.remove('flowing');
  isFlowing = false;
  showView('input');
  setTimeout(() => document.getElementById('input-text').focus(), 350);
}

/* ═══════════════════════════════
   SERVICE WORKER
═══════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
